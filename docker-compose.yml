version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: newsflux_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsflux
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: newsflux_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsflux_api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/newsflux
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9a2b4def7e8f0a214bc9e8ad0f3f21873bcd4e7a8f15b3a4d9e0f6c2e8a10b4f

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsflux_celery
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/newsflux
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsflux_spa
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
