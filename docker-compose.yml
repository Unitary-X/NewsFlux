services:
  db:
    image: postgres:15-alpine
    container_name: newsflux_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsflux
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: newsflux_redis
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsflux_api
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "18000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL so the backend talks to the db container, not localhost
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/newsflux
      - REDIS_URL=redis://redis:6379/0

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsflux_celery
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/newsflux
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsflux_spa
    ports:
      - "10006:80"
    depends_on:
      - backend

volumes:
  postgres_data:
